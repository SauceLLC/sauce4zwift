        REVERSE_NORMAL = 5;
        REVERSE_POLKA_DOT = 6;
        REVERSE_GREEN = 7;
        REVERSE_ORANGE = 8;
    }

    int32 athleteId = 1;
    int32 obsoleteJersey = 2;
    int64 msBehind = 3;  // gap?  XXX rename to gapBehind if it's a time gap and not a timestamp
    int32 virtualPower = 4;  // not sure why it's an int
    int32 lapCount = 5;
    int32 power = 6;
    int32 distance = 7;  // meters
    repeated JerseyType jerseyTypes = 8;
}

