    uint64 _f5 = 5;
}

// Match JSON...
enum EventType {
    EFONDO = 0;
    RACE = 1;
    GROUP_RIDE = 2;
    GROUP_WORKOUT = 3;
    TIME_TRIAL = 4;
    TEAM_TIME_TRIAL = 5;
}

// Match JSON...
enum EventCulling {
    UNDEFINED = 0;
    CULLING_EVERYBODY = 1;
    CULLING_EVENT_ONLY = 2;
    CULLING_SUBGROUP_ONLY = 3;
}

message Event {
    int32 id = 1;
    int32 realm = 2;
    string name = 3;
    string description = 4;
    uint64 eventStart = 5;
    string _duration = 6;  // possibly deprecated
    float distanceInMeters = 7;
    int32 laps = 8;
    int32 followeeRegisteredCount = 9;
    repeated EventSubgroup eventSubgroups = 10;
    string _shortName = 11;  // claims deprecated, but I still see it
    string imageUrl = 12;
    uint32 durationInSeconds = 13;
    uint64 routeId = 14;
    uint32 rulesId = 15;
    int32 totalRegisteredCount = 16;
    bool visible = 17;
    uint64 jerseyHash = 18;
    string auxiliaryUrl = 19;
    string imageS3Name = 20;
    string imageS3Bucket = 21;
    Sport sport = 22;
    uint64 bikeHash = 23;
    EventCulling cullingType = 24;
    uint64 workoutHash = 25;
    string customUrl = 26;
    EventType eventType = 27;
    bool overrideMapPreferences = 28;
    bool invisibleToNonParticipants = 29;
    EventSeries eventSeries = 30;
    string _tags = 31; // semi-colon delimited tags
    // deprecated uint64 organizerProfileId = 32;
    bool wtrl = 33; // internally restricted
    int32 lateJoinInMinutes = 34;
    int32 mapId = 35;  // technically worldId, but JSON events call this mapId.
    EventTimeTrialOptions tto = 36;
    string routeUrl = 37;
    string shortDescription = 38;
    int32 minGameVersion = 39;
    MicroserviceEventData msed = 40;
    int32 totalEntrantCount = 42; // or signed up count
    int32 followeeEntrantCount = 43; // signed up count
    bool categoryEnforcement = 44;
    string rangeAccessLabel = 45;
}

message Events {
    repeated Event events = 1;
}

