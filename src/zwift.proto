// This is a fork of the wonderful work at https://github.com/zoffline/zwift-offline
syntax = "proto3";

message PlayerState {
    int32 athleteId = 1;
    uint64 worldTime = 2;
    int32 distance = 3; // meters
    int32 roadTime = 4;
    int32 laps = 5;
    int32 _speed = 6; // mm / hour
    int32 acceleration = 7;
    int32 roadPosition = 8;  // Horiz, i.e. lane.
    int32 _cadence = 9;  // revolutions per second * 1e6
    int32 draft = 10;
    int32 heartrate = 11;
    int32 power = 12;
    int32 _heading = 13;  // microrads from -pi -> 3pi
    int32 lean = 14;  // i.e. yaw
    int32 climbing = 15;
    int32 time = 16;
    int32 animationState = 17;
    uint32 frameHue = 18; // aux_1 
    uint32 _flags1 = 19; // Packed with info parsed in user code, aux_2
    uint32 _flags2 = 20; // Packed with info parsed in user code, aux_3
    uint32 _progress = 21; // 16-32 are some sort of inverse mask when set, 8-16 is pct progress, 0 is workout // aux_4
    int64 profileUpdatedAt = 22;
    bool justWatching = 23; // internally called lurking
    int32 _mwHours = 24; // milliwatt/hours of energy
    float x = 25;
    float z = 26;
    float y = 27;
    int32 watchingAthleteId = 28;
    int32 eventSubgroupId = 29;
    // no 30
    Sport sport = 31;
    // deprecated route distance = 32;
    int32 timeGap = 33;
    float _eventDistance = 34; // cm
    int32 courseId = 35;
    int32 routeCheckpointIndex = 36;
    int32 routeDecisionIndex = 37;
    bool canSteer = 38;
    uint32 routeId = 39;
    int32 pacerBotGroupSize = 40;
    bool activeSteer = 41; // internally "express delivery", wut?
    int32 rideOnStyle = 42;
    bool portal = 43;
    int32 portalGradientScale = 44; // 0 = 50%, 1 = 75%, 2 = 100%, 3 = 125%
    int32 portalElevationScale = 45; // 50, 75, 100 or 125
    // deprecated int32 boostPad = 46;
    // deprecated int32 hazardPad = 47;
    // deprecated int32 timeBonus = 48;
    repeated int32 playerVFXs = 49;
    bool bigHeadActive = 50;
    int32 botId = 51;
}

message SocialAction {
    int32 from = 1;
    int32 to = 2;  // 0 if public message
    int32 actionType = 3;  // always value 1 ?
    string firstName = 4;
    string lastName = 5;
    string message = 6;
    string avatar = 7;
    int32 countryCode = 8;
    int32 flagType = 9;
    int32 messageGroupType = 10;  // defaults to 1
    int32 messageGroupId = 11;
}

message RideOn {
    int32 from = 1;
    int32 to = 2;
    string firstName = 3;
    string lastName = 4;
    int32 countryCode = 5;
    int32 style = 6;
    bool bomb = 7;
}

message PlayerJoinedWorld {
    int32 athleteId = 1;
    int64 worldTime = 2;
}

message PlayerLeftWorld {
    int32 athleteId = 1;
    int64 worldTime = 2;
    bool forced = 3;
    bool timeout = 4;
    repeated int64 affectedSegmentIds = 5;
}

message WorldUpdate {
    enum WorldUpdatePayloadType {
        _UNSET = 0;
        _TEST = 1;
        PlayerJoinedWorld = 2;
        PlayerLeftWorld = 3;
        RideOn = 4;
        SocialAction = 5;
        Event = 6;
        PlayerJoinedEvent = 7;
        PlayerLeftEvent = 8;
        ProfileUpdated = 9;
        PrivateEventInvitation = 10;
        PlayerKicked = 11;
        PlayerUnlockedAchievement = 12;
        QuestNotification = 13;
        PlayerItemUpdated = 14;
        PlayerRecomendationsUpdated = 15;
        PlayerRacingScoreUpdated = 16;

        // Binary structs...
        WorldTime = 100;
        RoadTime = 101;
        PerformAction = 102;
        GroupMessage = 103;
        PrivateMessage = 104;
        SegmentResult = 105;
        PlayerFlag = 106;
        BroadcastRideLeaderAction = 108;
        PlayerRegisteredForEvent = 109;
        NotableMoment = 110;
        LateJoinRequest = 111;
        RouteHashRequest = 112;
        FenceStats = 113;
        FenceConfig = 114;
        BroadcastBibNumberForGroupEvent = 115;
        PacePartnerInfo = 116;
    }

    // deprecated uint64 id = 1;
    int32 realm = 2;
    WorldUpdatePayloadType payloadType = 3;
    bytes _payload = 4;
    uint64 payloadWorldTime = 5;
    int32 x = 6;
    int32 z = 7;
    int32 y = 8;
    uint64 expireWorldTime = 9;
    int32 forAthleteId = 10;
    int32 radiusFilter = 11;
    // deprecated int64 seqno = 12;
    uint64 ts = 14;
    int32 courseId = 15;
    bool forceBroadcastInWorldMap = 16;
}

message SegmentResult {
    int64 id = 1;
    int32 athleteId = 2;
    int32 realm = 3;
    int32 worldId = 4;
    uint64 _unsignedSegmentId = 5;
    uint32 eventSubgroupId = 6;
    string firstName = 7;
    string lastName = 8;
    uint64 worldTime = 9;
    string finishTime = 10;
    uint32 elapsed = 11; // ms
    PowerType powerType = 12;
    int32 weight = 13; // grams
    int32 height = 14; // cm
    uint32 avgPower = 15;
    bool male = 16;
    string dob = 17;
    uint32 playerType = 18;
    int32 avgHR = 19;
    Sport sport = 20;
    int64 activityId = 21;
    bool pairedSteering = 22;
    string firstInitial = 23;
    int32 eventCategory = 24;
}

message SegmentResults {
    int32 realm = 1;
    uint64 _unsignedSegmentId = 2;
    uint64 eventSubgroupId = 3;
    repeated SegmentResult results = 4;
}

message PlayerPlacement {
    int32 athleteId = 1;
    float distanceCovered = 2;
    int32 timeGapToLeader = 3; // ms
    int32 position = 4;
}

message EventPositions {
    int32 position = 1;  // focused player 
    repeated PlayerPlacement players1 = 2; // top players
    repeated PlayerPlacement players2 = 3; // last players
    repeated PlayerPlacement players3 = 4; // close players ahead
    repeated PlayerPlacement players4 = 5; // close players behind
    int32 activeAthleteCount = 6;
    int32 watchingAthleteId = 7;
    int32 watchingTimeGapToLeader = 8;  // ms
    repeated PlayerPlacement players10 = 10; // nearby players
}

message PlayerSummary {
    int32 athleteIdOffset = 1;  // presumably from the summarie's `firstPlayerId`
    int32 x = 2;
    int32 z = 3;
    int32 y = 4;
}

message PlayerSummaries {
    int32 firstAthleteId = 1;
    int32 referencePointX = 2;
    int32 referencePointZ = 3;
    int32 referencePointY = 4;
    int32 scaleX = 5;
    int32 scaleZ = 6;
    int32 scaleY = 7;
    repeated PlayerSummary summaries = 8;
}

message ServerToClient {
    int32 realm = 1;
    int32 athleteId = 2;
    uint64 worldTime = 3;
    int32 seqno = 4;
    int32 ackSeqno = 5;  // UDP ack to our previously sent seqno
    // no 6, 7
    repeated PlayerState playerStates = 8;
    repeated WorldUpdate worldUpdates = 9;  // interanlly call World Attributes
    repeated int64 deletedWorldUpdates = 10;
    // deprecated bool noWorldUpdates = 11;
    string companionIP = 12;
    // deprecated int64 worldUpdatesThroughWorldtime = 13;
    int32 athleteCount = 14;
    int32 companionPort = 15;
    int32 companionProtocol = 16; // 1 = UDP, 2 = TCP
    int64 latency = 17;
    int32 msgCount = 18;
    int32 msg = 19;
    bool multipleLogins = 20;
    PlayerSummaries playerSummaries = 21; // never seen
    // no 22;
    EventPositions eventPositions = 23;
    UDPConfig udpConfig = 24;
    UDPConfigVOD udpConfigVOD = 25;
    int32 expungeReason = 26;
    UDPConfigVOD fullUDPConfigVOD = 27;
    repeated PlayerState blockPlayerStates = 28;
    TCPConfig tcpConfig = 29;
    repeated int64 ackSubscribedSegments = 30;
    int32 companionSecurePort = 31;
    bytes companionAesKey = 32;
}

message UDPServer {
    int32 realm = 1;
    int32 courseId = 2;
    string ip = 3;
    int32 port = 4; // default 3022
    float xBound = 5;
    float yBound = 6;
    float xBoundMin = 7;
    float yBoundMin = 8;
    int32 securePort = 9;  // default 3024
}

message UDPServerVODPool {
    int32 realm = 1;
    int32 courseId = 2;
    repeated UDPServer servers = 3;
    bool useFirstInBounds = 4;  // internally called "rectangles algorithm"
}

message UDPConfigVOD {
    repeated UDPServerVODPool pools = 1;
    int32 port = 2;  // default 3022
    int64 maxPlayerStateAsOf = 3;
    int32 watchingAthleteId = 4;
    float watchingX = 5;
    float watchingY = 6;
    int32 securePort = 7;  // default 3024
    repeated UDPServerVODPool portalPools = 8;
}

message UDPConfig {
    repeated UDPServer servers = 1;
    int32 clientTimeout = 2;  // seconds
    int32 reconnectionInterval = 3;  // seconds
    int32 maxReconnectAttempts = 4;
}

message NotableMoment { //.2,.3,.4 meanings inside last_activity.bin - not type, priority, incidentTime (i.e. 1595, 8, 9)
    enum NotableMomentTypeZG {
        NEW_PR = 0;
        GAINED_LEVEL = 5;
        TRAINING_PLAN_COMPLETE = 19;
        UNLOCKED_ITEM = 4;
        ACHIEVEMENT_UNLOCKED = 2;
        MISSION_COMPLETED = 3;
        COMPLETED_GOAL = 10;
        MET_DAILY_TARGET = 1;
        TOOK_ARCH_JERSEY = 8;
        FINISHED_CHALLENGE = 17;
        FINISHED_EVENT = 13;
        FINISHED_WORKOUT = 15;
        ACTIVITY_BESTS = 20;
        RIDEON = 18;
        RIDEON_INT = 22; //international
        QUIT_EVENT = 12;
        USED_POWERUP = 6;
        PASSED_TIMING_ARCH = 7;
        CREATED_GOAL = 9;
        JOINED_EVENT = 11;
        STARTED_WORKOUT = 14;
        STARTED_MISSION = 16;
        HOLIDAY_EVENT_COMPLETE = 21;
    }

    uint64 activityId = 1;
    NotableMomentTypeZG type = 2;
    uint32 priority = 3;
    uint64 incidentTime = 4;
    string aux1 = 5; // examples: {"achievementId":35,"name":"PAIRED","description":"Paired a phone through Zwift Companion"}
                              //           {"segmentName":"Marina Sprint","jerseyHash":"0x997d9df7","durationInMS":30524} (from last_activity.bin)
    string aux2 = 6; // empty string
    string largeImageUrl = 7;
}

message SocialInteraction {
    uint64 athleteId = 1;
    uint32 timeDuration = 2;
    float proximityTimeScore = 3;
    string _f4 = 4;
}

message ClubAttribution {
    string name = 1;
    float value = 2;
}

